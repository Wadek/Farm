<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FARM NETWORK</title>
<style>
  :root {
    --green: #00ff88;
    --green-dim: #00cc66;
    --dim: #4d9970;
    --bg: #000000;
    --surface: #0a0a0a;
    --input-bg: #111a11;
    --border: #1a3a1a;
    --border-bright: #00ff88;
    --warn: #ffe566;
    --red: #ff6b6b;
    --white: #e8ffe8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Courier New', Courier, monospace;
    font-size: 15px;
    min-height: 100vh;
    padding: 0 0 4rem 0;
  }
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--green);
    padding: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 1.1rem; letter-spacing: 0.25em; color: var(--green); text-shadow: 0 0 10px var(--green); }
  #user-line { font-size: 0.8rem; color: var(--dim); }
  .btn {
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: inherit;
    font-size: 0.9rem;
    padding: 0.7rem 1.3rem;
    cursor: pointer;
    letter-spacing: 0.12em;
    min-height: 48px;
    min-width: 48px;
    text-shadow: 0 0 6px var(--green);
  }
  .btn:active, .btn:hover { background: var(--green); color: var(--bg); text-shadow: none; }
  .btn-sm { padding: 0.5rem 1rem; min-height: 40px; font-size: 0.8rem; }
  .btn-danger { border-color: var(--red); color: var(--red); text-shadow: 0 0 6px var(--red); }
  .btn-danger:active, .btn-danger:hover { background: var(--red); color: var(--bg); }
  section { padding: 1rem; max-width: 680px; margin: 0 auto; }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border-bright);
    padding: 1rem;
    margin-bottom: 1rem;
  }
  .panel-title {
    font-size: 0.75rem;
    letter-spacing: 0.35em;
    color: var(--green);
    border-bottom: 1px solid var(--border-bright);
    padding-bottom: 0.5rem;
    margin-bottom: 0.85rem;
    text-shadow: 0 0 8px var(--green);
  }
  label { display: block; font-size: 0.8rem; color: var(--white); margin-bottom: 0.3rem; margin-top: 0.85rem; letter-spacing: 0.08em; }
  input, select {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--green-dim);
    color: var(--white);
    font-family: inherit;
    font-size: 1rem;
    padding: 0.75rem;
    min-height: 48px;
  }
  input:focus, select:focus { outline: 2px solid var(--green); background: #0d1f0d; }
  select option { background: var(--input-bg); color: var(--white); }
  .stat {
    display: flex;
    justify-content: space-between;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
  }
  .stat:last-child { border-bottom: none; }
  .stat-key { color: var(--dim); }
  .stat-val { color: var(--white); font-weight: normal; }
  .tip { padding: 0.75rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; line-height: 1.6; }
  .tip:last-child { border-bottom: none; }
  .tip-q { color: var(--dim); font-size: 0.75rem; margin-bottom: 0.3rem; }
  .tip-r { color: var(--white); }
  .tip-pending { color: var(--warn); }
  .node-card {
    border: 1px solid var(--green-dim);
    padding: 1rem;
    margin-bottom: 0.6rem;
    cursor: pointer;
    background: var(--surface);
  }
  .node-card:active, .node-card:hover { border-color: var(--green); background: #0d1f0d; }
  .node-name { font-size: 1.05rem; margin-bottom: 0.3rem; color: var(--green); }
  .node-meta { font-size: 0.78rem; color: var(--dim); }
  .temp-big {
    font-size: 3rem;
    letter-spacing: -0.02em;
    line-height: 1;
    padding: 0.5rem 0;
    color: var(--green);
    text-shadow: 0 0 20px var(--green);
  }
  .hidden { display: none; }
  .err { color: var(--red); font-size: 0.85rem; margin-top: 0.6rem; text-shadow: 0 0 6px var(--red); }
  .ok { color: var(--green); font-size: 0.85rem; margin-top: 0.6rem; }
  #loading { color: var(--dim); font-size: 0.85rem; }
  .tag {
    display: inline-block;
    border: 1px solid var(--green-dim);
    color: var(--dim);
    font-size: 0.68rem;
    padding: 0.15rem 0.4rem;
    letter-spacing: 0.1em;
    margin-left: 0.4rem;
    vertical-align: middle;
  }
  nav { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .produce-card {
    border: 1px solid var(--border);
    padding: 0.65rem;
    margin-bottom: 0.4rem;
    font-size: 0.85rem;
  }
  .produce-name { color: var(--white); margin-bottom: 0.2rem; }
  .produce-meta { color: var(--dim); font-size: 0.75rem; }
  .listing-card {
    border: 1px solid var(--green-dim);
    padding: 0.65rem;
    margin-bottom: 0.4rem;
    font-size: 0.85rem;
  }
  .listing-card.reserved { border-color: var(--warn); }
  .listing-card.completed { border-color: var(--border); opacity: 0.5; }
</style>
</head>
<body>

<header>
  <h1>⬡ FARM NETWORK</h1>
  <div id="user-line">not logged in</div>
</header>

<section id="view-login">
  <div class="panel" style="margin-top:1rem">
    <div class="panel-title">LOGIN</div>
    <label>EMAIL</label>
    <input id="login-email" type="email" autocomplete="email">
    <label>PASSWORD</label>
    <input id="login-pass" type="password" autocomplete="current-password">
    <div style="margin-top:1rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
      <button class="btn" onclick="login()">LOGIN</button>
      <button class="btn" onclick="showView('register')">REGISTER</button>
    </div>
    <div class="err hidden" id="login-err"></div>
  </div>
</section>

<section id="view-register" class="hidden">
  <div class="panel" style="margin-top:1rem">
    <div class="panel-title">REGISTER</div>
    <label>NAME</label>
    <input id="reg-name" type="text">
    <label>EMAIL</label>
    <input id="reg-email" type="email">
    <label>PASSWORD</label>
    <input id="reg-pass" type="password">
    <label>ROLE</label>
    <select id="reg-role">
      <option value="farmer">FARMER</option>
      <option value="buyer">BUYER</option>
    </select>
    <div style="margin-top:1rem; display:flex; gap:0.5rem;">
      <button class="btn" onclick="register()">CREATE ACCOUNT</button>
      <button class="btn" onclick="showView('login')">BACK</button>
    </div>
    <div class="err hidden" id="reg-err"></div>
    <div class="ok hidden" id="reg-ok"></div>
  </div>
</section>

<section id="view-main" class="hidden">
  <nav style="margin-top:1rem">
    <button class="btn btn-sm" onclick="loadNodes()">NODES</button>
    <button class="btn btn-sm" onclick="loadMarket()">MARKET</button>
    <button class="btn btn-sm" onclick="loadTips()">DAILY TIPS</button>
    <button class="btn btn-sm btn-danger" onclick="logout()">LOGOUT</button>
  </nav>

  <!-- NODES -->
  <div id="view-nodes">
    <div class="panel">
      <div class="panel-title">MY NODES</div>
      <div id="node-list"><span id="loading">loading...</span></div>
      <button class="btn btn-sm" onclick="showAddNode()" style="margin-top:0.75rem">+ ADD NODE</button>
    </div>

    <div class="panel hidden" id="add-node-form">
      <div class="panel-title">NEW NODE</div>
      <label>NAME</label><input id="n-name" type="text">
      <label>TYPE</label>
      <select id="n-type">
        <option value="garden_bed">GARDEN BED</option>
        <option value="backyard">BACKYARD</option>
        <option value="hobby_farm">HOBBY FARM</option>
        <option value="farm">FARM</option>
      </select>
      <label>LAT</label><input id="n-lat" type="number" step="0.0001" value="60.5522">
      <label>LNG</label><input id="n-lng" type="number" step="0.0001" value="24.7050">
      <label>AREA (m²)</label><input id="n-area" type="number" step="0.1" value="0">
      <label>DESCRIPTION</label><input id="n-desc" type="text">
      <div style="margin-top:1rem; display:flex; gap:0.5rem;">
        <button class="btn" onclick="createNode()">CREATE</button>
        <button class="btn" onclick="document.getElementById('add-node-form').classList.add('hidden')">CANCEL</button>
      </div>
      <div class="err hidden" id="node-err"></div>
    </div>
  </div>

  <!-- NODE DETAIL -->
  <div id="view-node-detail" class="hidden">
    <button class="btn btn-sm" onclick="loadNodes()" style="margin-bottom:0.75rem">← BACK</button>

    <div class="panel">
      <div class="panel-title">NODE INFO</div>
      <div id="node-detail-info"></div>
    </div>

    <div class="panel">
      <div class="panel-title">SENSORS
        <button class="btn btn-sm" onclick="syncSensors()" style="float:right;margin-top:-0.25rem">↻ SYNC</button>
      </div>
      <div id="sensor-data"><span style="color:var(--dim)">press SYNC to pull from Ruuvi Cloud + Ajax</span></div>
    </div>

    <div class="panel">
      <div class="panel-title">PRODUCE
        <button class="btn btn-sm" onclick="showAddProduce()" style="float:right;margin-top:-0.25rem">+ ADD</button>
      </div>
      <div id="produce-list"><span style="color:var(--dim)">loading...</span></div>
      <div class="hidden" id="add-produce-form" style="margin-top:0.75rem;border-top:1px solid var(--border);padding-top:0.75rem">
        <label>NAME</label><input id="p-name" type="text" placeholder="e.g. Tomatoes">
        <label>CATEGORY</label><input id="p-category" type="text" placeholder="e.g. vegetable">
        <label>QUANTITY (kg)</label><input id="p-qty" type="number" step="0.1" value="0">
        <label>KCAL/kg</label><input id="p-kcal" type="number" step="1" value="0">
        <label>LOCAL CO₂ (kg CO₂/kg produce)</label><input id="p-co2" type="number" step="0.01" value="0">
        <div style="margin-top:0.75rem;display:flex;gap:0.5rem">
          <button class="btn btn-sm" onclick="createProduce()">SAVE</button>
          <button class="btn btn-sm" onclick="document.getElementById('add-produce-form').classList.add('hidden')">CANCEL</button>
        </div>
        <div class="err hidden" id="produce-err"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">LISTINGS</div>
      <div id="listing-list"><span style="color:var(--dim)">loading...</span></div>
      <div id="add-listing-form" class="hidden" style="margin-top:0.75rem;border-top:1px solid var(--border);padding-top:0.75rem">
        <div style="font-size:0.75rem;color:var(--dim);margin-bottom:0.5rem" id="listing-produce-label"></div>
        <label>QUANTITY (kg)</label><input id="l-qty" type="number" step="0.1" value="1">
        <label>PRICE/kg (€, 0 = free)</label><input id="l-price" type="number" step="0.1" value="0">
        <label>PICKUP POINT</label><input id="l-pickup" type="text" placeholder="leave blank = node location">
        <label style="display:flex;align-items:center;gap:0.5rem;margin-top:0.75rem">
          <input type="checkbox" id="l-free" style="width:auto;min-height:auto"> FREE / BARTER
        </label>
        <div style="margin-top:0.75rem;display:flex;gap:0.5rem">
          <button class="btn btn-sm" onclick="createListing()">LIST IT</button>
          <button class="btn btn-sm" onclick="document.getElementById('add-listing-form').classList.add('hidden')">CANCEL</button>
        </div>
        <div class="err hidden" id="listing-err"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">TOKEN LEDGER</div>
      <div id="node-ledger"><span style="color:var(--dim)">loading...</span></div>
    </div>
  </div>

  <!-- MARKETPLACE -->
  <div id="view-market" class="hidden">
    <div class="panel">
      <div class="panel-title">MARKETPLACE</div>
      <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;flex-wrap:wrap">
        <input id="mkt-lat" type="number" step="0.0001" placeholder="lat" value="60.5522" style="width:120px">
        <input id="mkt-lng" type="number" step="0.0001" placeholder="lng" value="24.7050" style="width:120px">
        <input id="mkt-radius" type="number" value="20" placeholder="km" style="width:80px">
        <button class="btn btn-sm" onclick="loadMarket()">SEARCH</button>
      </div>
      <div id="market-list"><span style="color:var(--dim)">loading...</span></div>
    </div>
  </div>

  <!-- TIPS -->
  <div id="view-tips" class="hidden">
    <div class="panel">
      <div class="panel-title">DAILY TIPS</div>
      <div id="tips-content"><span style="color:var(--dim)">loading...</span></div>
      <button class="btn btn-sm" onclick="generateTips()" style="margin-top:0.75rem">GENERATE TODAY'S TIPS</button>
      <div class="ok hidden" id="tips-ok"></div>
    </div>
  </div>
</section>

<script>
const API = '';
let token = localStorage.getItem('farm_token') || '';
let currentNodeId = '';

function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  return fetch(API + path, { headers, ...opts }).then(r => r.json());
}

function showView(v) {
  ['login','register','main'].forEach(id =>
    document.getElementById('view-' + id).classList.add('hidden'));
  document.getElementById('view-' + v).classList.remove('hidden');
}

function showSubView(v) {
  ['nodes','node-detail','market','tips'].forEach(id =>
    document.getElementById('view-' + id).classList.add('hidden'));
  document.getElementById('view-' + v).classList.remove('hidden');
}

async function login() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  const form = new URLSearchParams({ username: email, password: pass });
  const res = await fetch(API + '/auth/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: form,
  }).then(r => r.json());
  if (res.access_token) {
    token = res.access_token;
    localStorage.setItem('farm_token', token);
    afterLogin();
  } else {
    show('login-err', res.detail || 'login failed');
  }
}

async function afterLogin() {
  const me = await api('/auth/me');
  document.getElementById('user-line').textContent = me.name + ' [' + me.role + ']';
  showView('main');
  loadNodes();
}

async function register() {
  const res = await api('/auth/register', {
    method: 'POST',
    body: JSON.stringify({
      name: document.getElementById('reg-name').value,
      email: document.getElementById('reg-email').value,
      password: document.getElementById('reg-pass').value,
      role: document.getElementById('reg-role').value,
    }),
  });
  if (res.id) {
    show('reg-ok', 'account created — log in');
    hide('reg-err');
  } else {
    show('reg-err', res.detail || 'error');
  }
}

function logout() {
  token = '';
  localStorage.removeItem('farm_token');
  document.getElementById('user-line').textContent = 'not logged in';
  showView('login');
}

async function loadNodes() {
  showSubView('nodes');
  const nodes = await api('/nodes');
  const el = document.getElementById('node-list');
  if (!nodes.length) { el.innerHTML = '<span style="color:var(--dim)">no nodes yet</span>'; return; }
  el.innerHTML = nodes.map(n => `
    <div class="node-card" onclick="openNode('${n.id}')">
      <div class="node-name">${n.name} <span class="tag">${n.type}</span></div>
      <div class="node-meta">
        ${n.area_m2}m² · ${n.lat.toFixed(4)}, ${n.lng.toFixed(4)} · ⬡ ${n.myc_tokens} MYC
        ${n.ruuvi ? `· 🌡 ${n.ruuvi.temperature_c}°C` : ''}
      </div>
    </div>`).join('');
}

async function openNode(id) {
  currentNodeId = id;
  showSubView('node-detail');
  const node = await api('/nodes/' + id);
  document.getElementById('node-detail-info').innerHTML = `
    <div class="stat"><span class="stat-key">NAME</span><span class="stat-val">${node.name}</span></div>
    <div class="stat"><span class="stat-key">TYPE</span><span class="stat-val">${node.type}</span></div>
    <div class="stat"><span class="stat-key">AREA</span><span class="stat-val">${node.area_m2} m²</span></div>
    <div class="stat"><span class="stat-key">COORDS</span><span class="stat-val">${node.lat}, ${node.lng}</span></div>
    <div class="stat"><span class="stat-key">MYC BALANCE</span><span class="stat-val">⬡ ${node.myc_tokens}</span></div>
    ${node.description ? `<div class="stat"><span class="stat-key">DESC</span><span class="stat-val">${node.description}</span></div>` : ''}
  `;
  loadSensors(id);
  loadLedger(id);
  loadProduce(id);
}

let listingProduceId = '';

async function loadProduce(id) {
  const items = await api('/nodes/' + id + '/produce');
  const el = document.getElementById('produce-list');
  const lel = document.getElementById('listing-list');
  if (!items.length) {
    el.innerHTML = '<span style="color:var(--dim)">no produce — add what you grow</span>';
    lel.innerHTML = '<span style="color:var(--dim)">add produce first</span>';
    return;
  }
  el.innerHTML = items.map(p => `
    <div class="produce-card">
      <div class="produce-name">${p.name} <span class="tag">${p.category}</span></div>
      <div class="produce-meta">${p.quantity_kg} kg · ${p.kcal_per_kg} kcal/kg · CO₂ ${p.co2_kg_per_kg} kg/kg</div>
      <button class="btn btn-sm" onclick="showAddListing('${p.id}','${p.name}')" style="margin-top:0.4rem">LIST →</button>
    </div>`).join('');
  loadListings(id);
}

async function loadListings(id) {
  const data = await api('/listings');
  const el = document.getElementById('listing-list');
  const mine = data.filter(l => l.node_id === id);
  if (!mine.length) { el.innerHTML = '<span style="color:var(--dim)">no active listings</span>'; return; }
  el.innerHTML = mine.map(l => `
    <div class="listing-card ${l.status}">
      <div style="display:flex;justify-content:space-between">
        <span style="color:var(--white)">${l.produce_name} — ${l.quantity_kg} kg</span>
        <span style="color:var(--dim)">${l.is_free ? 'FREE' : l.price_per_kg + ' €/kg'}</span>
      </div>
      <div style="font-size:0.75rem;color:var(--dim);margin-top:0.2rem">${l.pickup_point} · <span style="color:${l.status==='active'?'var(--green)':'var(--warn)'}">${l.status.toUpperCase()}</span></div>
      ${l.status === 'active' ? `<button class="btn btn-sm" onclick="setListingStatus('${l.id}','reserved')" style="margin-top:0.4rem">RESERVE</button>
      <button class="btn btn-sm" onclick="setListingStatus('${l.id}','completed')" style="margin-top:0.4rem;margin-left:0.3rem">COMPLETE</button>` : ''}
    </div>`).join('');
}

function showAddProduce() {
  document.getElementById('add-produce-form').classList.remove('hidden');
}

function showAddListing(produceId, produceName) {
  listingProduceId = produceId;
  document.getElementById('listing-produce-label').textContent = 'LISTING FOR: ' + produceName;
  document.getElementById('add-listing-form').classList.remove('hidden');
  document.getElementById('add-listing-form').scrollIntoView({ behavior: 'smooth' });
}

async function createProduce() {
  const res = await api('/nodes/' + currentNodeId + '/produce', {
    method: 'POST',
    body: JSON.stringify({
      name: document.getElementById('p-name').value,
      category: document.getElementById('p-category').value,
      quantity_kg: parseFloat(document.getElementById('p-qty').value) || 0,
      kcal_per_kg: parseFloat(document.getElementById('p-kcal').value) || 0,
      co2_kg_per_kg: parseFloat(document.getElementById('p-co2').value) || 0,
    }),
  });
  if (res.id) {
    document.getElementById('add-produce-form').classList.add('hidden');
    loadProduce(currentNodeId);
  } else {
    show('produce-err', res.detail || 'error');
  }
}

async function createListing() {
  const res = await api('/nodes/' + currentNodeId + '/produce/' + listingProduceId + '/listings', {
    method: 'POST',
    body: JSON.stringify({
      quantity_kg: parseFloat(document.getElementById('l-qty').value) || 1,
      price_per_kg: parseFloat(document.getElementById('l-price').value) || 0,
      pickup_point: document.getElementById('l-pickup').value,
      is_free: document.getElementById('l-free').checked,
    }),
  });
  if (res.id) {
    document.getElementById('add-listing-form').classList.add('hidden');
    loadListings(currentNodeId);
  } else {
    show('listing-err', res.detail || 'error');
  }
}

async function setListingStatus(listingId, status) {
  await api('/listings/' + listingId + '/status?status=' + status, { method: 'PATCH' });
  loadListings(currentNodeId);
}

async function loadMarket() {
  showSubView('market');
  const lat = document.getElementById('mkt-lat')?.value || '60.5522';
  const lng = document.getElementById('mkt-lng')?.value || '24.7050';
  const radius = document.getElementById('mkt-radius')?.value || '20';
  const data = await api(`/listings?lat=${lat}&lng=${lng}&radius_km=${radius}`);
  const el = document.getElementById('market-list');
  if (!data.length) { el.innerHTML = '<span style="color:var(--dim)">no active listings within ' + radius + ' km</span>'; return; }
  el.innerHTML = data.map(l => `
    <div class="listing-card">
      <div style="display:flex;justify-content:space-between">
        <span style="color:var(--white)">${l.produce_name} — ${l.quantity_kg} kg</span>
        <span style="color:var(--dim)">${l.is_free ? 'FREE' : l.price_per_kg + ' €/kg'}</span>
      </div>
      <div style="font-size:0.75rem;color:var(--dim);margin-top:0.2rem">
        📍 ${l.pickup_point}
        ${l.distance_km != null ? ' · ' + l.distance_km + ' km' : ''}
      </div>
    </div>`).join('');
}

const SENSOR_ICONS = {
  temperature: '🌡', humidity: '💧', pressure: '⬇', battery: '🔋',
  door: '🚪', motion: '👁', fence: '⚡', fire: '🔥', leak: '💧', alarm: '🚨'
};

async function loadSensors(id) {
  const sensors = await api('/nodes/' + id + '/sensors');
  const el = document.getElementById('sensor-data');
  if (!sensors.length) {
    el.innerHTML = '<span style="color:var(--dim)">no readings — press SYNC (requires Ruuvi/Ajax credentials in .env)</span>';
    return;
  }
  const ruuvi = sensors.filter(s => s.source === 'ruuvi');
  const ajax = sensors.filter(s => s.source === 'ajax');

  let html = '';
  if (ruuvi.length) {
    const temp = ruuvi.find(s => s.sensor_type === 'temperature');
    if (temp) html += `<div class="temp-big">${temp.value.toFixed(1)}°C</div>`;
    html += ruuvi.map(s => `
      <div class="stat">
        <span class="stat-key">${SENSOR_ICONS[s.sensor_type]||''} ${s.sensor_type.toUpperCase()} <span style="font-size:0.7rem;color:var(--dim)">${s.device_name||''}</span></span>
        <span class="stat-val">${s.value != null ? s.value + (s.unit||'') : s.status||'--'}</span>
      </div>`).join('');
  }
  if (ajax.length) {
    html += `<div style="margin-top:0.75rem;font-size:0.72rem;color:var(--dim);letter-spacing:0.2em">AJAX SECURITY</div>`;
    html += ajax.map(s => `
      <div class="stat">
        <span class="stat-key">${SENSOR_ICONS[s.sensor_type]||''} ${(s.device_name||s.sensor_type).toUpperCase()}</span>
        <span class="stat-val" style="color:${s.status==='triggered'||s.status==='open'?'var(--warn)':'var(--green)'}">${s.status||'--'}</span>
      </div>`).join('');
  }
  el.innerHTML = html;
}

async function syncSensors() {
  const el = document.getElementById('sensor-data');
  el.innerHTML = '<span style="color:var(--dim)">syncing...</span>';
  await api('/nodes/' + currentNodeId + '/sync', { method: 'POST' });
  loadSensors(currentNodeId);
}

async function loadLedger(id) {
  const data = await api('/transactions/node/' + id);
  const el = document.getElementById('node-ledger');
  if (!data.ledger || !data.ledger.length) {
    el.innerHTML = '<span style="color:var(--dim)">no transactions yet</span>'; return;
  }
  el.innerHTML = data.ledger.map(tx => `
    <div class="stat">
      <span class="stat-key">${tx.created_at ? tx.created_at.slice(0,10) : '?'} ${tx.quantity_kg}kg</span>
      <span class="stat-val">+⬡ ${tx.myc_tokens_minted}</span>
    </div>`).join('');
}

function showAddNode() {
  document.getElementById('add-node-form').classList.remove('hidden');
}

async function createNode() {
  const res = await api('/nodes', {
    method: 'POST',
    body: JSON.stringify({
      name: document.getElementById('n-name').value,
      type: document.getElementById('n-type').value,
      lat: parseFloat(document.getElementById('n-lat').value),
      lng: parseFloat(document.getElementById('n-lng').value),
      area_m2: parseFloat(document.getElementById('n-area').value),
      description: document.getElementById('n-desc').value,
    }),
  });
  if (res.id) { loadNodes(); }
  else { show('node-err', res.detail || 'error'); }
}

async function loadTips() {
  showSubView('tips');
  const today = await api('/tips/today');
  renderTips(today.tips || []);
}

async function generateTips() {
  show('tips-ok', 'generating... this may take a minute');
  const res = await api('/tips/daily?lat=60.5522&lng=24.7050', { method: 'POST' });
  if (res.session_id) {
    pollTips(res.session_id);
  }
}

async function pollTips(sessionId) {
  const res = await api('/tips/session/' + sessionId);
  renderTips(res.tips || []);
  if (res.status === 'running') setTimeout(() => pollTips(sessionId), 5000);
  else { hide('tips-ok'); }
}

function renderTips(tips) {
  const el = document.getElementById('tips-content');
  if (!tips.length) { el.innerHTML = '<span style="color:var(--dim)">no tips — press GENERATE</span>'; return; }
  el.innerHTML = tips.map((t, i) => `
    <div class="tip">
      <div class="tip-q">[${String(i+1).padStart(2,'0')}] ${t.question.slice(0, 120)}...</div>
      <div class="${t.status === 'pending' ? 'tip-pending' : 'tip-r'}">${t.response || '⏳ pending...'}</div>
    </div>`).join('');
}

function show(id, msg) { const e = document.getElementById(id); e.textContent = msg; e.classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

// init
if (token) { afterLogin(); } else { showView('login'); }
</script>
</body>
</html>
